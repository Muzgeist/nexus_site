<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Imports — Carrinho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telacarrinho.css">
</head>
<body>

<div class="nexus-bg nexus-bg--light" aria-hidden="true"></div>

<!-- Toast de feedback -->
<div class="toast" id="toast" aria-live="polite"></div>

<div class="page-wrapper">

  <header class="nexus-header">
    <a href="telaprincipal.html" class="logo-home-link" aria-label="Voltar à página principal">
      <div class="logo-icon"><img src="../img/nexus-logo.png" alt="Nexus Logo"></div>
    <span class="logo-text">NEXUS IMPORTS</span>
    </a>
    <div class="header-actions">
      <button class="btn-hamburger" id="btnHamburger" aria-label="Menu de navegação" aria-expanded="false">
        <span class="hb-line"></span>
        <span class="hb-line"></span>
        <span class="hb-line"></span>
      </button>
      <div class="hamburger-dropdown" id="hamburgerDropdown" role="menu">
        <a href="telaprodutos.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Produtos
        </a>
        <a href="telacompras.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Pedidos
        </a>
      </div>
      <a href="telausuario.html" class="btn-avatar-header" aria-label="Meu perfil" title="Meu perfil">
        <div class="avatar-header-fallback">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <span class="avatar-header-ring" aria-hidden="true"></span>
      </a>
    </div>
  </header>

  <main class="carrinho-main">

    <!-- Hero com contagem e botão COMPRAR TUDO no topo -->
    <div class="carrinho-hero reveal">
      <div class="hero-left">
        <h1 class="page-title">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:middle;margin-right:10px">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
          </svg>
          Meu Carrinho
        </h1>
        <span class="badge-count" id="badgeCount">0 itens</span>
      </div>

      <div class="hero-right-actions">
        <!-- BOTÃO COMPRAR SELECIONADOS — ativo apenas quando há seleção -->
        <button type="button" class="btn-nexus btn-comprar-selecionados" id="btnComprarSelecionados" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Comprar Selecionados <span id="countSelecionados">(0)</span></span>
        </button>

        <!-- BOTÃO COMPRAR TUDO — destaque máximo -->
        <button type="button" class="btn-nexus btn-comprar-tudo" id="btnComprarTudo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span>Comprar Tudo</span>
        </button>
      </div>
    </div>

    <!-- Selecionar todos -->
    <div class="carrinho-select-all reveal">
      <label class="checkbox-wrap">
        <input type="checkbox" id="checkSelectAll" class="produto-checkbox">
        <span class="checkbox-box" aria-hidden="true"></span>
        <span class="checkbox-label">Selecionar todos</span>
      </label>
    </div>

    <!-- Grid de produtos (máx. 3 por linha) -->
    <section class="produtos-grid reveal reveal-delay-1" id="lista-pedidos" aria-label="Produtos no carrinho">
      <!-- Preenchido dinamicamente por telacarrinho.js a partir do carrinho salvo -->
    </section>

    <!-- Carrinho vazio -->
    <div class="carrinho-vazio" id="carrinhoVazio" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
      </svg>
      <h2>Seu carrinho está vazio</h2>
      <p>Adicione produtos para vê-los aqui.</p>
      <a href="telaprodutos.html" class="btn-nexus"><span>Ver produtos</span></a>
    </div>

    <!-- Resumo -->
    <div class="carrinho-resumo reveal reveal-delay-2">
      <div class="resumo-card">
        <div class="resumo-row">
          <span>Total de itens</span>
          <strong id="totalItens">3</strong>
        </div>
        <div class="resumo-divider"></div>
        <button type="button" class="btn-nexus btn-finalizar" id="btnFinalizar">
          <span>Finalizar Pedido</span>
        </button>
      </div>
    </div>

  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telacarrinho.js"></script>
</body>
</html>
