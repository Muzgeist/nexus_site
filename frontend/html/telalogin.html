<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

<main>
    <div class="formulario">
        <h2>Login</h2>


    <!-- SUBSTITUIR "/login" pela rota de login do seu backend -->
    <form action="/login" method="POST">

        <div class="campo"
            <label for="nome">Nome:</label>
            <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Insira seu nome"
                required
            >
        </div>

        <div class="campo">
            <label for="email">E-mail:</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Insira seu e-mail"
                required
            >
        </div>

        <div class="campo">
            <label for="senha">Senha:</label>
            <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Insira sua senha"
                required
            >
        </div>

        <button type="submit">Login</button>

    </form>
</div>

</main>

</body>
</html>
