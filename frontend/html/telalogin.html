<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Imports — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telalogin.css">
</head>
<body>

<div class="nexus-bg" aria-hidden="true"></div>

<div class="page-wrapper">

  <header class="nexus-header">
    <a href="telaprincipal.html" class="logo-home-link" aria-label="Voltar à página principal">
      <div class="logo-icon"><img src="../img/nexus-logo.png" alt="Nexus Logo"></div>
    <span class="logo-text">NEXUS IMPORTS</span>
    </a>
  </header>

  <main class="login-main">
    <div class="login-container reveal">

      <!-- Decorative glow orb -->
      <div class="login-orb" aria-hidden="true"></div>

      <div class="login-header reveal reveal-delay-1">
        <div class="login-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <h1 class="login-title">Bem-vindo de volta</h1>
        <p class="login-sub">Acesse sua conta Nexus</p>
      </div>

      <form action="#" class="login-form" id="loginForm" novalidate>

        <div class="campos-stack reveal reveal-delay-2">

          <div class="campo" data-field="email">
            <label class="campo-label" for="email">E-mail</label>
            <div class="campo-wrap">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 6 10-6"/>
                </svg>
              </span>
              <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo" data-field="senha">
            <label class="campo-label" for="senha">
              Senha
              <a href="#" class="forgot-link">Esqueceu?</a>
            </label>
            <div class="campo-wrap">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password">
              <button type="button" class="senha-toggle" id="senhaToggle" aria-label="Mostrar senha">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

        </div>

        <div class="form-footer reveal reveal-delay-3">
          <button type="submit" class="btn-nexus btn-login">
            <span>Entrar</span>
          </button>
          <p class="register-link">Não tem conta? <a href="telacadastro.html">Cadastre-se</a></p>
        </div>

      </form>
    </div>
  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telalogin.js"></script>
</body>
</html>
