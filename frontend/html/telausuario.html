<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
</head>
<body>

<main>
    <div class="perfil">

```
    <h2>Meu Perfil</h2>

    <!-- SUBSTITUIR src PELO CAMINHO DA FOTO VINDA DO BANCO -->
    <div class="foto-perfil">
        <img
            id="fotoPerfil"
            src="/imagens/foto-padrao.png"
            alt="Foto de Perfil"
            width="150"
            height="150"
        >
    </div>

    <div class="campo">
        <label>Nome:</label>
        <!-- SUBSTITUIR PELO NOME VINDO DO BANCO -->
        <p id="nome">Nome do Usuário</p>
    </div>

    <div class="campo">
        <label>E-mail:</label>
        <!-- SUBSTITUIR PELO EMAIL VINDO DO BANCO -->
        <p id="email">usuario@email.com</p>
    </div>

    <div class="campo">
        <label>CPF/CNPJ:</label>
        <!-- SUBSTITUIR PELO CPF/CNPJ VINDO DO BANCO -->
        <p id="cpf">000.000.000-00</p>
    </div>

    <div class="campo">
        <label>Telefone:</label>
        <!-- SUBSTITUIR PELO TELEFONE VINDO DO BANCO -->
        <p id="telefone">(00) 00000-0000</p>
    </div>

</div>
```

</main>

</body>
</html>
