<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Imports — Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telausuario.css">
</head>
<body>

<div class="nexus-bg" aria-hidden="true"></div>

<div class="page-wrapper">

  <header class="nexus-header">
    <a href="telaprincipal.html" class="logo-home-link" aria-label="Voltar à página principal">
      <div class="logo-icon"><img src="../img/nexus-logo.png" alt="Nexus Logo"></div>
    <span class="logo-text">NEXUS IMPORTS</span>
    </a>
    <div class="header-actions">
      <button class="btn-hamburger" id="btnHamburger" aria-label="Menu de navegação" aria-expanded="false">
        <span class="hb-line"></span>
        <span class="hb-line"></span>
        <span class="hb-line"></span>
      </button>
      <div class="hamburger-dropdown" id="hamburgerDropdown" role="menu">
        <a href="telaprodutos.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Produtos
        </a>
        <a href="telacarrinho.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          Carrinho
        </a>
        <a href="telacompras.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Pedidos
        </a>
      </div>
    </div>
  </header>

  <main class="usuario-main">

    <!-- Avatar hero com edição de foto -->
    <section class="avatar-hero reveal">
      <div class="avatar-edit-wrap" id="avatarEditWrap" title="Clique para alterar foto">
        <div class="avatar-ring-outer">
          <div class="avatar-ring-inner">
            <img id="fotoPerfil" src="" alt="Foto de Perfil" class="avatar-img" style="display:none;">
            <div class="avatar-fallback" id="avatarFallback">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </div>
          </div>
        </div>
        <!-- Overlay câmera ao hover -->
        <div class="avatar-camera-overlay" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Alterar foto</span>
        </div>
        <input type="file" id="fotoInput" accept="image/*" style="display:none;" aria-label="Selecionar foto">
      </div>

      <div class="avatar-name-wrap">
        <h1 class="avatar-name" id="displayNome">Nome do Usuário</h1>
        <span class="avatar-tag">Nexus Member</span>
      </div>
    </section>

    <!-- Campos do perfil -->
    <section class="perfil-campos">

      <div class="perfil-campo reveal reveal-delay-1" data-field="nome">
        <div class="campo-header">
          <span class="campo-icone">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <span class="campo-rotulo">Nome</span>
          <button class="btn-editar" aria-label="Editar nome">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="campo-valor-wrap">
          <p class="campo-valor" id="nome">Nome do Usuário</p>
          <div class="campo-edit-wrap" style="display:none">
            <input type="text" class="campo-input" value="Nome do Usuário" autocomplete="name">
            <div class="edit-actions">
              <button class="btn-save">Salvar</button>
              <button class="btn-cancel">Cancelar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="perfil-campo reveal reveal-delay-2" data-field="email">
        <div class="campo-header">
          <span class="campo-icone">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 6 10-6"/>
            </svg>
          </span>
          <span class="campo-rotulo">E-mail</span>
          <button class="btn-editar" aria-label="Editar e-mail">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="campo-valor-wrap">
          <p class="campo-valor" id="email">usuario@email.com</p>
          <div class="campo-edit-wrap" style="display:none">
            <input type="email" class="campo-input" value="usuario@email.com" autocomplete="email">
            <div class="edit-actions">
              <button class="btn-save">Salvar</button>
              <button class="btn-cancel">Cancelar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="perfil-campo reveal reveal-delay-3" data-field="cpf">
        <div class="campo-header">
          <span class="campo-icone">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h7"/>
            </svg>
          </span>
          <span class="campo-rotulo">CPF / CNPJ</span>
          <button class="btn-editar" aria-label="Editar CPF">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="campo-valor-wrap">
          <p class="campo-valor" id="cpf">000.000.000-00</p>
          <div class="campo-edit-wrap" style="display:none">
            <input type="text" class="campo-input" value="000.000.000-00" maxlength="18">
            <div class="edit-actions">
              <button class="btn-save">Salvar</button>
              <button class="btn-cancel">Cancelar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="perfil-campo reveal reveal-delay-4" data-field="telefone">
        <div class="campo-header">
          <span class="campo-icone">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
            </svg>
          </span>
          <span class="campo-rotulo">Telefone</span>
          <button class="btn-editar" aria-label="Editar telefone">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="campo-valor-wrap">
          <p class="campo-valor" id="telefone">(00) 00000-0000</p>
          <div class="campo-edit-wrap" style="display:none">
            <input type="tel" class="campo-input" value="(00) 00000-0000" maxlength="15" autocomplete="tel">
            <div class="edit-actions">
              <button class="btn-save">Salvar</button>
              <button class="btn-cancel">Cancelar</button>
            </div>
          </div>
        </div>
      </div>

    </section>

    <!-- Botão de Logout -->
    <div style="display:flex;justify-content:center;margin-top:36px;margin-bottom:12px;">
      <button class="btn-logout" id="btnLogout" onclick="nexusLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair da conta
      </button>
    </div>

  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telausuario.js"></script>
</body>
</html>
