<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Imports — Meus Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telacompras.css">
</head>
<body>

<div class="nexus-bg" aria-hidden="true"></div>

<!-- Toast de feedback -->
<div class="toast" id="toast" aria-live="polite"></div>

<!-- Modal de confirmação de cancelamento -->
<div class="modal-overlay" id="modalOverlay" aria-hidden="true">
  <div class="modal-box">
    <div class="modal-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h3 class="modal-title">Cancelar Pedido?</h3>
    <p class="modal-desc">Esta ação não pode ser desfeita. O pedido <strong id="modalPedidoNum">#0000</strong> será cancelado.</p>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="btnModalCancel">Voltar</button>
      <button class="btn-modal-confirm" id="btnModalConfirm">Sim, cancelar</button>
    </div>
  </div>
</div>

<div class="page-wrapper">

  <header class="nexus-header">
    <a href="telaprincipal.html" class="logo-home-link" aria-label="Voltar à página principal">
      <div class="logo-icon"><img src="../img/nexus-logo.png" alt="Nexus Logo"></div>
    <span class="logo-text">NEXUS IMPORTS</span>
    </a>
    <div class="header-actions">
      <button class="btn-hamburger" id="btnHamburger" aria-label="Menu de navegação" aria-expanded="false">
        <span class="hb-line"></span>
        <span class="hb-line"></span>
        <span class="hb-line"></span>
      </button>
      <div class="hamburger-dropdown" id="hamburgerDropdown" role="menu">
        <a href="telaprodutos.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Produtos
        </a>
        <a href="telacarrinho.html" class="hb-nav-link" role="menuitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          Carrinho
        </a>
      </div>
      <a href="telausuario.html" class="btn-avatar-header" aria-label="Meu perfil" title="Meu perfil">
        <div class="avatar-header-fallback">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <span class="avatar-header-ring" aria-hidden="true"></span>
      </a>
    </div>
  </header>

  <main class="compras-main">

    <div class="compras-hero reveal">
      <h1 class="page-title">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:middle;margin-right:10px">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Meus Pedidos
      </h1>
    </div>

    <!-- Loader -->
    <div class="compras-loader" id="comprasLoader">
      <div class="loader-ring"></div>
      <span>Carregando seus pedidos…</span>
    </div>

    <!-- Estado vazio -->
    <div class="compras-vazio" id="comprasVazio" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <h2>Você ainda não fez nenhum pedido</h2>
      <p>Explore nossos produtos e faça sua primeira compra.</p>
      <a href="telaprodutos.html" class="btn-nexus"><span>Ver produtos</span></a>
    </div>

    <section class="compras-lista" id="lista-compras" style="display:none;">
      <!-- Preenchido dinamicamente por telacompras.js -->
    </section>

  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telacompras.js"></script>
</body>
</html>
