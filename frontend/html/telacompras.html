<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Imports — Minhas Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telacompras.css">
</head>
<body>

<div class="nexus-bg" aria-hidden="true"></div>

<div class="page-wrapper">

  <header class="nexus-header">
    <div class="logo-icon">N</div>
    <span class="logo-text">NEXUS IMPORTS</span>
    <nav class="header-nav">
      <a href="telacarrinho.html" class="nav-link">Carrinho</a>
      <a href="telausuario.html" class="nav-link">Perfil</a>
    </nav>
  </header>

  <main class="compras-main">

    <div class="compras-hero reveal">
      <h1 class="page-title">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:middle;margin-right:10px">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        Minhas Compras
      </h1>
    </div>

    <!-- Lista de compras — alinhada à esquerda conforme especificado -->
    <section class="compras-lista" id="lista-compras">

      <!-- EXEMPLO — backend irá preencher -->
      <article class="compra-card reveal reveal-delay-1">
        <div class="compra-accent"></div>
        <div class="compra-top">
          <span class="compra-numero">#0001</span>
          <span class="compra-status compra-status--separacao">Em Separação</span>
        </div>
        <div class="compra-body">
          <div class="compra-field">
            <span class="field-label">Produto</span>
            <span class="field-value">Nome do Produto</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Quantidade</span>
            <span class="field-value">2</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Valor Total</span>
            <span class="field-value field-value--price">R$ 100,00</span>
          </div>
        </div>
      </article>

      <article class="compra-card reveal reveal-delay-2">
        <div class="compra-accent compra-accent--done"></div>
        <div class="compra-top">
          <span class="compra-numero">#0002</span>
          <span class="compra-status compra-status--entregue">Entregue</span>
        </div>
        <div class="compra-body">
          <div class="compra-field">
            <span class="field-label">Produto</span>
            <span class="field-value">Outro Produto</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Quantidade</span>
            <span class="field-value">1</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Valor Total</span>
            <span class="field-value field-value--price">R$ 50,00</span>
          </div>
        </div>
      </article>

      <article class="compra-card reveal reveal-delay-3">
        <div class="compra-accent compra-accent--transit"></div>
        <div class="compra-top">
          <span class="compra-numero">#0003</span>
          <span class="compra-status compra-status--transito">Em Trânsito</span>
        </div>
        <div class="compra-body">
          <div class="compra-field">
            <span class="field-label">Produto</span>
            <span class="field-value">Terceiro Produto</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Quantidade</span>
            <span class="field-value">3</span>
          </div>
          <div class="compra-field">
            <span class="field-label">Valor Total</span>
            <span class="field-value field-value--price">R$ 280,00</span>
          </div>
        </div>
      </article>
      <!-- /EXEMPLO -->

    </section>

  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telacompras.js"></script>
</body>
</html>
