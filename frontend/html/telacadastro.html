<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<main>
<div class="formulario">
    <h2>Crie sua conta</h2>
<form action="backendaqui" method="post" enctype="multipart/form-data">

    <div class="campo">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Insira seu nome aqui">
    </div>

    <div class="campo">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Insira seu email aqui">
    </div>

    <div class="campo">
        <label for="cpf">CPF/CNPJ:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Insira seu CPF ou CNPJ aqui">
    </div>

    <div class="campo">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Insira seu telefone aqui">
    </div>

    <div class="campo">
        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco" placeholder="Insira seu endereço aqui">
    </div>

    <div class="campo">
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Insira sua senha aqui">
    </div>

    <div class="campo">
        <label for="foto">Foto de Perfil:</label>
        <input type="file" id="foto" name="foto" accept="image/*">
    </div>

    <button type="submit">Cadastrar</button>

</form>
</div>

</main>
    
</body>
</html>
