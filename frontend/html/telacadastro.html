<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../img/nexus-logo.png">
  <title>Nexus Imports — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/nexus-shared.css">
  <link rel="stylesheet" href="../css/telacadastro.css">
</head>
<body>

<!-- Fundo animado -->
<div class="nexus-bg" aria-hidden="true"></div>

<div class="page-wrapper">

  <!-- Header -->
  <header class="nexus-header">
    <a href="telaprincipal.html" class="logo-home-link" aria-label="Voltar à página principal">
      <div class="logo-icon"><img src="../img/nexus-logo.png" alt="Nexus Logo"></div>
    <span class="logo-text">NEXUS IMPORTS</span>
    </a>
    <div class="header-actions"></div>
  </header>

  <main class="cadastro-main">
    <div class="cadastro-container reveal">

      <div class="cadastro-header reveal reveal-delay-1">
        <h1 class="cadastro-title">Crie sua conta</h1>
        <p class="cadastro-sub">Junte-se à Nexus e acesse hardware de alta performance</p>
      </div>

      <form action="#" method="post" enctype="multipart/form-data" class="cadastro-form" id="cadastroForm" novalidate>

        <!-- Foto de Perfil (Discord-style) -->
        <div class="avatar-section reveal reveal-delay-2">
          <div class="avatar-btn-wrap">
            <button type="button" class="avatar-btn" id="avatarBtn" aria-label="Selecionar foto de perfil">
              <span class="avatar-placeholder" id="avatarPlaceholder">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
              </span>
              <img id="avatarPreview" class="avatar-preview" alt="Foto de perfil" style="display:none;">
              <div class="avatar-overlay">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </div>
            </button>
            <input type="file" id="foto" name="foto" accept="image/*" class="avatar-input" tabindex="-1">
          </div>
          <span class="avatar-label">Foto de Perfil</span>
        </div>

        <!-- Campos do formulário -->
        <div class="campos-grid reveal reveal-delay-3">

          <div class="campo" data-field="nome">
            <label class="campo-label" for="nome">Nome</label>
            <div class="campo-wrap">
              <input type="text" id="nome" name="nome" placeholder="Seu nome completo" autocomplete="name">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
              </span>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo" data-field="email">
            <label class="campo-label" for="email">E-mail</label>
            <div class="campo-wrap">
              <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 6 10-6"/>
                </svg>
              </span>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo" data-field="cpf">
            <label class="campo-label" for="cpf">CPF / CNPJ</label>
            <div class="campo-wrap">
              <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="18">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h7"/>
                </svg>
              </span>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo" data-field="telefone">
            <label class="campo-label" for="telefone">Telefone</label>
            <div class="campo-wrap">
              <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" maxlength="15">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
                </svg>
              </span>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo campo--full" data-field="endereco">
            <label class="campo-label" for="endereco">Endereço</label>
            <div class="campo-wrap">
              <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro, cidade" autocomplete="street-address">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7z"/><circle cx="12" cy="9" r="2.5"/>
                </svg>
              </span>
              <span class="campo-status"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

          <div class="campo campo--full" data-field="senha">
            <label class="campo-label" for="senha">Senha</label>
            <div class="campo-wrap">
              <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres">
              <span class="campo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <button type="button" class="senha-toggle" id="senhaToggle" aria-label="Mostrar senha">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <span class="campo-status"></span>
            </div>
            <div class="senha-strength" id="senhaStrength">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
            <span class="campo-msg"></span>
          </div>

        </div>

        <div class="form-footer reveal reveal-delay-4">
          <button type="submit" class="btn-nexus btn-cadastrar">
            <span>Criar Conta</span>
          </button>
          <p class="login-link">Já tem conta? <a href="telalogin.html">Faça login</a></p>
        </div>

        <div class="google-divider">ou</div>

        <button type="button" class="btn-google" onclick="nexusGoogleLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Cadastrar com Google
        </button>

      </form>
    </div>
  </main>
</div>

<script src="../js/nexus-shared.js"></script>
<script src="../js/telacadastro.js"></script>
</body>
</html>
